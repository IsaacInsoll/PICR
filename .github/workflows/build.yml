# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
name: PICR Build

on:
  workflow_call:

jobs:
  build:
    name: PICR Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Show Node & npm versions
        run: |
          node -v
          npm -v
          which node
          which npm
      - name: '📦 [root] Install Dependencies'
        run: npm ci
      - name: '🎨 [format] Prettier check'
        run: npm run format:check

      # BACKEND
      - name: '🗃️ [shared] Install Dependencies'
        run: cd shared && npm ci
      - name: '🗃️ [backend] Install Dependencies'
        run: cd backend && npm ci
      - name: '🗃️ [shared] Lint'
        run: cd shared && npm run lint
      - name: '🗃️ [shared] Type check'
        run: cd shared && npx tsc --noEmit
      - name: '🗃️ [backend] Lint'
        run: cd backend && npm run lint
      - name: '🗃️ [backend] Build (TSC + artifact files)'
        # backend build also copies drizzle migrations and backend package files into dist/
        run: cd backend && npm run build
      - name: '🗃️ [backend] Install Dependencies'
        run: cd dist && npm ci

      # LIGHTROOM PLUGIN (before frontend so vite copies it to dist/public/)
      - name: '🔌 [lightroom] Build plugin zip'
        run: npm run build:lightroom

      # FRONTEND
      - name: '💄 [frontend] Install Dependencies'
        run: cd frontend && npm ci
      - name: '💄 [frontend] Lint'
        run: cd frontend && npm run lint
      - name: '💄 [frontend] Type check'
        run: cd frontend && npx tsc --noEmit
      - name: '💄 [frontend] Build (vite)'
        run: cd frontend && npm run build -- --logLevel error

      # APP
      # Not needed for artifact, just checking that it didn't break something
      # Hermes won't compile on arm so skip it
      - name: '📱 [app] Install Dependencies'
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: cd app && npm ci
      - name: '📱 [app] Lint'
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: cd app && npm run lint
      - name: '📱 [app] Type check'
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: cd app && npm run typecheck
      - name: '📱 [app] Build (expo export)'
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        shell: bash
        run: |
          set -euo pipefail
          cd app
          npx expo export --platform ios 2>&1 | awk '
            /^› (Assets|ios bundles|android bundles|web bundles|Files) \(/ { skip=1; next }
            skip && NF==0 { skip=0; next }
            skip { next }
            { print }
          '

      # TESTS
      - name: '🧪 [tests/api] download sample files'
        run: mkdir -p ./tests/api/env && wget --no-verbose https://photosummaryapp.com/picr-demo-data.zip --output-document=./tests/api/env/sample.zip
      - name: '🧪 [tests/api] run backend tests (vitest)'
        run: npm run test:api
      - name: '🧪 [tests/e2e] install playwright browser'
        shell: bash
        run: |
          set -euo pipefail
          echo "Installing Playwright Chromium..."
          if npm run test:e2e:install > /tmp/playwright-install.log 2>&1; then
            echo "Playwright Chromium install succeeded."
          else
            echo "Playwright Chromium install failed. Full output:"
            cat /tmp/playwright-install.log
            exit 1
          fi
      - name: '🧪 [tests/e2e] run frontend smoke tests'
        run: npm run test:e2e

      # ARTIFACT
      - uses: actions/upload-artifact@v4
        if: ${{ !env.ACT }}
        name: '🗜️ Generate Build Artifacts'
        with:
          name: picr-build-${{ github.sha }}
          path: ./dist/
          if-no-files-found: error
