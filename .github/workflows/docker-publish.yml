name: PICR Docker Publish

on:
  workflow_call:
    inputs:
      build_channel:
        required: true
        type: string
      development_build_sha:
        required: false
        type: string
      image_tags:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  docker_build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: picr-build-${{ github.sha }}
          path: ./dist
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PICR_BUILD_CHANNEL=${{ inputs.build_channel }}
            PICR_DEVELOPMENT_BUILD_SHA=${{ inputs.development_build_sha }}
            PICR_GIT_SHA=${{ github.sha }}
            PICR_VERSION=${{ inputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/isaacinsoll/picr
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: ${{ inputs.image_tags }}
