name: picr-test
services:
  test-picr:
    container_name: test-picr
    build: ../..
    volumes:
      - ./env/media:/home/node/app/media:ro
    # intentionally leaving the cache inside the container as we can't write to the host when running in docker ?
    #      - ./env/cache:/home/node/app/cache
    depends_on:
      test-db:
        condition: service_healthy
    ports:
      - '6901:6900'
    environment:
      - DATABASE_URL=postgres://user:pass@test-db/picr
      - USE_POLLING=true
      - POLLING_INTERVAL=100
      - BASE_URL=http://localhost:6901/
      # Pin the first-boot admin credentials so the suite logs in deterministically
      # (matches defaultCredentials). Without this the auto-created admin would get
      # a random password and every auth test would fail.
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=picr1234
  test-db:
    container_name: test-db
    ports:
      - '54313:5432'
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: picr
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d picr']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - type: tmpfs
        target: /var/lib/postgresql/data
